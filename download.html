        * {

            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

            color: #333;

        /* --- CARD CONTAINER --- */
        .download-container {

            max-width: 450px;

            border: 1px solid #e1e4e8;

        /* --- VISUALS --- */
        .app-icon {

            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }

        /* --- TYPOGRAPHY --- */
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #111;
        }

        p.description {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* --- METADATA PILLS --- */
        .meta-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            font-size: 14px;
            color: #555;
        }

        .meta-item {
            background: #f0f2f5;
            padding: 6px 12px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- BUTTONS --- */
        .btn-download {
            display: block;
            width: 100%;
            background-color: #007bff;
            color: white;
            padding: 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px rgba(0, 123, 255, 0.2);
        }

        .btn-download:hover {
            background-color: #0056b3;
        }

        .btn-download:active {
            transform: scale(0.98);
        }

        /* --- LINKS --- */
        .secondary-links {
            margin-top: 25px;
            font-size: 14px;
        }

        .secondary-links a {
            color: #666;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.2s;
        }

        .secondary-links a:hover {
            color: #007bff;
            text-decoration: underline;
        }
        
        /* --- SVG STYLING --- */
        .icon-svg {
            width: 16px;
